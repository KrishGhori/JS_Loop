<div class="container">

<h2>Check Voting Eligibility</h2>

<input type="number" id="ageInput" placeholder="Enter your age">

<button onclick="checkAge()">Submit</button>

<p id="result"></p>

</div>

<script>
function checkAge(){

let age = Number(document.getElementById("ageInput").value);

if(age === 0){
document.getElementById("result").innerText = "Please enter your age.";
}
else if(age >= 18){
document.getElementById("result").innerText = "You are eligible to vote.";
}
else{
document.getElementById("result").innerText = "You are not eligible to vote.";
}

}
</script>
