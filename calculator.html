<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Calculator</title>

<link rel="stylesheet" href="main.css">

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
}

/* Navigation Bar */
nav{
    background: #333;
    padding: 10px;
}

nav a{
    color: white;
    text-decoration: none;
    margin: 10px;
    font-size: 16px;
}

nav a:hover{
    color: yellow;
}

/* Calculator Box */
.container{
    background: white;
    width: 350px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

input{
    width: 80%;
    padding: 8px;
    margin: 5px;
}

button{
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover{
    background: #0056b3;
}

#result{
    font-size: 18px;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<nav>

<div class="container">

<h2>Calculator Using Switch Case</h2>

<input type="number" id="num1" placeholder="Enter First Number"><br>

<input type="number" id="num2" placeholder="Enter Second Number"><br>

<input type="number" id="choice" placeholder="Enter Choice (1-5)"><br>

<p>
1 - Addition <br>
2 - Subtraction <br>
3 - Multiplication <br>
4 - Division <br>
5 - Modulus
</p>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>

</div>

<script>
function calculate(){

let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
let choice = Number(document.getElementById("choice").value);

let result;

switch(choice){

case 1:
result = a + b;
break;

case 2:
result = a - b;
break;

case 3:
result = a * b;
break;

case 4:
if(b === 0){
result = "Cannot divide by zero";
}else{
result = a / b;
}
break;

case 5:
result = a % b;
break;

default:
result = "Invalid Choice";

}

document.getElementById("result").innerText = "Result: " + result;

}
</script>

</body>
