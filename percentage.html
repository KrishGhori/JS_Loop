<div>

<h2>Grade Calculator</h2>

<input type="number" id="percentage" placeholder="Enter Percentage">

<br>

<button onclick="findGrade()">Find Grade</button>

<p id="result"></p>

</div>

<script>
function findGrade(){

let per = Number(document.getElementById("percentage").value);
let grade;

if(per > 100 || per < 0){
grade = "Invalid Percentage";
}
else if(per >= 90){
grade = "O";
}
else if(per >= 80){
grade = "A+";
}
else if(per >= 70){
grade = "A";
}
else if(per >= 60){
grade = "B+";
}
else if(per >= 50){
grade = "B";
}
else if(per >= 40){
grade = "C";
}
else{
grade = "F";
}

document.getElementById("result").innerText = "Grade: " + grade;

}
</script>
