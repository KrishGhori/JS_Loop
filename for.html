<div>

<h3>Number Pyramid using For Loop</h3>

<pre id="output"></pre>

</div>

<script>

let n = 5;
let result = "";

for(let i = 1; i <= n; i++){

    for(let s = 1; s <= n - i; s++){
        result += " ";
    }

    for(let j = 1; j <= i; j++){
        result += j + " ";
    }

    result += "\n";
}

document.getElementById("output").textContent = result;

</script>
