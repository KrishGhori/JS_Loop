    <div>
         <h2>Enter a Number for Positive</h2>
         

        <input type="number" id="numInput" placeholder="Enter number">
        <button onclick="checkNumber()">Check</button>

        <p id="result"></p>       
    </div>

    <script>
    function checkNumber() {
      let num = Number(document.getElementById("numInput").value);

      if (num > 0) {
        document.getElementById("result").innerText = "Positive number";
      } else if (num < 0) {
        document.getElementById("result").innerText = "Negative number";
      } else {
        document.getElementById("result").innerText = "Zero";
      }
    }
  </script>
